<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaShare - Privacy Policy</title>
    <meta name="description" content="MediaShare Privacy Policy." />
    <link rel="canonical" href="https://example.com/privacy.html" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="privacy">
    <header class="navbar">
      <div class="container navbar-inner">
        <a class="brand" href="index.html" aria-label="MediaShare">
          <img src="assets/images/logo/mediashare_logo.png" alt="MediaShare logo" class="brand-logo" />
          <span class="brand-text">MediaShare</span>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
        <nav class="nav-links" id="navLinks">
          <a href="index.html" data-i18n="nav.home"></a>
          <a href="privacy.html" data-i18n="nav.privacy"></a>
          <a href="user-policy.html" data-i18n="nav.userPolicy"></a>
          <a href="support.html" data-i18n="nav.support"></a>
          <div class="language-switch">
            <select id="languageSelect" aria-label="Language"></select>
          </div>
        </nav>
      </div>
    </header>

    <main class="section legal-container">
      <div class="container">
        <h1 data-i18n="privacy.title"></h1>
        <p class="text-secondary" data-i18n="privacy.lastUpdated"></p>
        <div id="legalContent" class="legal-content"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-bottom">
        <span data-i18n="footer.copyright"></span>
      </div>
    </footer>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
